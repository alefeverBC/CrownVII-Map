<script>
const INTEREST_COLORS = {
  'MI':   { fill:'#2563eb', stroke:'#1e3a8a' },
  'ORRI': { fill:'#dc2626', stroke:'#7f1d1d' },
};
function getColors(props) {
  return INTEREST_COLORS[props.Interest_T] || { fill:'#94a3b8', stroke:'#475569' };
}
const map = L.map('map', { center:[37.5,-90], zoom:5, zoomControl:true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:'abcd', maxZoom:19
}).addTo(map);
fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json')
  .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(topo => {
    const countiesGeo = topojson.feature(topo, topo.objects.counties);
    L.geoJSON(countiesGeo, {
      style:{ color:'#374151', weight:1.6, opacity:0.65, fillOpacity:0 }, interactive:false
    }).addTo(map);
    L.geoJSON(topojson.feature(topo, topo.objects.states), {
      style:{ color:'#111827', weight:2.5, opacity:0.7, fillOpacity:0 }, interactive:false
    }).addTo(map);

    // County name labels — visible at zoom 7+
    const labelLayer = L.layerGroup().addTo(map);

    // Weighted centroid: average of triangle centroids weighted by triangle area
    // Much more accurate than simple coordinate average for irregular shapes
    function polygonCentroid(ring) {
      let area = 0, cx = 0, cy = 0;
      const n = ring.length;
      for (let i = 0, j = n - 1; i < n; j = i++) {
        const xi = ring[i][0], yi = ring[i][1];
        const xj = ring[j][0], yj = ring[j][1];
        const a = xi * yj - xj * yi;
        area += a;
        cx += (xi + xj) * a;
        cy += (yi + yj) * a;
      }
      area /= 2;
      if (Math.abs(area) < 1e-12) {
        // fallback: bounding box center
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        ring.forEach(c => { minX=Math.min(minX,c[0]); maxX=Math.max(maxX,c[0]); minY=Math.min(minY,c[1]); maxY=Math.max(maxY,c[1]); });
        return [(minX+maxX)/2, (minY+maxY)/2];
      }
      return [cx / (6 * area), cy / (6 * area)];
    }

    function featureCentroid(f) {
      const geom = f.geometry;
      if (geom.type === 'Polygon') {
        return polygonCentroid(geom.coordinates[0]);
      } else if (geom.type === 'MultiPolygon') {
        // Use the largest polygon's centroid
        let bestArea = -Infinity, bestRing = null;
        geom.coordinates.forEach(poly => {
          const ring = poly[0];
          let area = 0;
          const n = ring.length;
          for (let i = 0, j = n-1; i < n; j = i++) {
            area += (ring[j][0]+ring[i][0]) * (ring[j][1]-ring[i][1]);
          }
          area = Math.abs(area) / 2;
          if (area > bestArea) { bestArea = area; bestRing = ring; }
        });
        return polygonCentroid(bestRing);
      }
      return null;
    }

    function updateLabels() {
      labelLayer.clearLayers();
      if (map.getZoom() < 7) return;
      const bounds = map.getBounds();
      countiesGeo.features.forEach(f => {
        if (!f.properties.name) return;
        const c = featureCentroid(f);
        if (!c) return;
        const lng = c[0], lat = c[1];
        if (!bounds.contains([lat, lng])) return;
        L.marker([lat, lng], {
          icon: L.divIcon({
            className: '',
            html: '<div style="width:140px;text-align:center;font-family:sans-serif;font-size:12px;color:#1a1a2e;font-weight:700;letter-spacing:0.03em;pointer-events:none;text-shadow:0 0 3px #f5f2ec,0 0 3px #f5f2ec,0 0 4px #f5f2ec,0 0 4px #f5f2ec,1px 1px 0 #f5f2ec,-1px -1px 0 #f5f2ec,1px -1px 0 #f5f2ec,-1px 1px 0 #f5f2ec">' + f.properties.name + '</div>',
            iconSize: [140, 20],
            iconAnchor: [70, 10]
          }),
          interactive: false
        }).addTo(labelLayer);
      });
    }
    map.on('zoomend moveend', updateLabels);
    document.getElementById('county-status').textContent = 'County lines loaded';
    setTimeout(() => document.getElementById('county-status').style.display='none', 2500);
  })
  .catch(err => {
    console.warn('County lines unavailable:', err);
    document.getElementById('county-status').textContent = 'County lines unavailable';

let currentBasin = 'all';

function styleFeature(feature) {
  const c = getColors(feature.properties);
  return { fillColor:c.fill, color:c.stroke, weight:2, dashArray:null, opacity:1, fillOpacity:0.55 };
}
function onEachFeature(feature, layer) {
  const p = feature.properties;
  const cop7 = (p.COP7_Net != null && p.COP7_Net !== '') ? parseFloat(p.COP7_Net).toFixed(2) : '—';
  layer.bindPopup(
    '<div style="font-family:Georgia,serif;min-width:210px">' +
    '<div style="background:#1e3a5f;color:#f0d060;padding:7px 12px;margin:-10px -12px 10px;border-radius:4px 4px 0 0;font-size:0.82rem;letter-spacing:.05em">' +

    '<tr><td style="color:#6b7280;padding:3px 0">Basin</td><td>' + (p.Basin || '&mdash;') + '</td></tr>' +
    '<tr><td style="color:#6b7280;padding:3px 0">Acquisition</td><td>' + (p.Acquisitio || '&mdash;') + '</td></tr>' +
    '<tr><td style="color:#6b7280;padding:3px 0">Crown VII NRA</td><td>' + cop7 + '</td></tr>' +
    '</table></div>',
    { maxWidth:290 }
  );
  layer.on('mouseover', function() {
    if (currentBasin !== 'all' && feature.properties.Basin !== currentBasin) return;
    this.setStyle({ weight:3.5, fillOpacity:0.78 });
    this.bringToFront();
  });
  layer.on('mouseout', function() {
    geoLayer.resetStyle(this);
    applyFilter();
  });
}
geoLayer = L.geoJSON(geojsonData, { style:styleFeature, onEachFeature:onEachFeature }).addTo(map);
map.fitBounds(geoLayer.getBounds(), { padding:[30,30] });
function applyFilter() {
  let visible = 0;
  geoLayer.eachLayer(layer => {
    const p = layer.feature.properties;
    if (currentBasin === 'all' || p.Basin === currentBasin) {
      layer.setStyle(styleFeature(layer.feature));
      visible++;
    } else {
      layer.setStyle({ fillOpacity:0.04, opacity:0.12, weight:0.5 });
    }
  });
  document.getElementById('stat-visible').textContent = visible;
}

    });
    if (bounds.length) {
      const combined = bounds.reduce((a,b) => a.extend(b), L.latLngBounds(bounds[0]));
      map.fitBounds(combined, { padding:[50,50] });
    }
  } else {
    map.fitBounds(geoLayer.getBounds(), { padding:[30,30] });
  }
}
</script>
